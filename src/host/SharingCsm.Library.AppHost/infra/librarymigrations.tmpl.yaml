api-version: 2024-02-02-preview
location: {{ .Env.AZURE_LOCATION }}
identity:
  type: UserAssigned
  userAssignedIdentities:
    ? "{{ .Env.AZURE_CONTAINER_REGISTRY_MANAGED_IDENTITY_ID }}"
    : {}
properties:
  environmentId: {{ .Env.AZURE_CONTAINER_APPS_ENVIRONMENT_ID }}
  configuration:
    activeRevisionsMode: single
    runtime:
      dotnet:
        autoConfigureDataProtection: true
    registries:
      - server: {{ .Env.AZURE_CONTAINER_REGISTRY_ENDPOINT }}
        identity: {{ .Env.AZURE_CONTAINER_REGISTRY_MANAGED_IDENTITY_ID }}
    secrets:
      - name: connectionstrings--librarydatabase
        value: '{{ .Env.LIBRARYPOSTGRES_CONNECTIONSTRING }};Database=librarydatabase'
  template:
    containers:
      - image: {{ .Image }}
        name: librarymigrations
        env:
          - name: AZURE_CLIENT_ID
            value: {{ .Env.MANAGED_IDENTITY_CLIENT_ID }}
          - name: LIBRARYDATABASE_DATABASENAME
            value: librarydatabase
          - name: LIBRARYDATABASE_HOST
            value: '{{ .Env.LIBRARYPOSTGRES_HOSTNAME }}'
          - name: LIBRARYDATABASE_JDBCCONNECTIONSTRING
            value: jdbc:postgresql://{{ .Env.LIBRARYPOSTGRES_HOSTNAME }}/librarydatabase?sslmode=require&authenticationPluginClassName=com.azure.identity.extensions.jdbc.postgresql.AzurePostgresqlAuthenticationPlugin
          - name: LIBRARYDATABASE_PORT
            value: "5432"
          - name: LIBRARYDATABASE_URI
            value: postgresql://{{ .Env.LIBRARYPOSTGRES_HOSTNAME }}/librarydatabase
          - name: OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY
            value: in_memory
          - name: ConnectionStrings__librarydatabase
            secretRef: connectionstrings--librarydatabase
    scale:
      minReplicas: 1
tags:
  azd-service-name: librarymigrations
  aspire-resource-name: librarymigrations
